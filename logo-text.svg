<svg width="240" height="70" viewBox="0 0 240 70" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义渐变色 -->
  <defs>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sloganGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.85" />
      <stop offset="33%" style="stop-color:#d97706;stop-opacity:0.85" />
      <stop offset="66%" style="stop-color:#2563eb;stop-opacity:0.85" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.85" />
    </linearGradient>
  </defs>
  
  <!-- 左侧图标 -->
  <g transform="translate(50, 15)">
    <!-- 四象限背景 -->
    <rect x="20" y="0" width="20" height="20" fill="#ef4444" opacity="0.9" rx="6"/>
    <rect x="0" y="0" width="20" height="20" fill="#f59e0b" opacity="0.9" rx="6"/>
    <rect x="20" y="20" width="20" height="20" fill="#3b82f6" opacity="0.9" rx="6"/>
    <rect x="0" y="20" width="20" height="20" fill="#10b981" opacity="0.9" rx="6"/>
    
    <!-- 分割线 -->
    
    <!-- 中心时钟 -->
    <circle cx="20" cy="20" r="6" fill="white" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="1" fill="#6366f1"/>
    <line x1="20" y1="20" x2="20" y2="15" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="24" y2="20" stroke="#6366f1" stroke-width="1" stroke-linecap="round"/>
  </g>
  
  <!-- 主标题 - 象限时光 -->
  <text x="95" y="35" font-family="Noto Sans SC" font-size="22" font-weight="700" fill="url(#titleGradient)">象限时光</text>

  <!-- 副标题 - 四格见天地，一步定乾坤 -->
  <text x="95" y="50" font-family="Noto Sans SC" font-size="8" font-weight="400" fill="url(#sloganGradient)">四格见天地，一步定乾坤</text>
</svg>

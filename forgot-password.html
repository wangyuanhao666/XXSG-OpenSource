<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 象限时光</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .forgot-password-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .forgot-password-container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }

        .forgot-password-header {
            background: #ffffff;
            padding: 25px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .forgot-password-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: #e9ecef;
            color: #495057;
        }

        .forgot-password-content {
            padding: 30px;
        }

        .info-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .info-section h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .info-section p {
            color: #666;
            font-size: 1rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #ffffff;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .form-group input.error {
            border-color: #dc3545;
        }

        .error-message {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .forgot-password-actions {
            padding: 25px 30px;
            background: #f8f9fa;
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background: #0056b3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(108, 117, 125, 0.3);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        .notification.success {
            background: #28a745;
        }

        .notification.error {
            background: #dc3545;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .forgot-password-container {
                max-width: 100%;
            }
            
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            
            .form-row .form-group {
                margin-bottom: 20px;
            }
            
            .forgot-password-content {
                padding: 20px;
            }
            
            .forgot-password-actions {
                padding: 20px;
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .forgot-password-container {
                border-radius: 0;
            }
            
            .forgot-password-content {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="forgot-password-page">
    <div class="forgot-password-container">
        <div class="forgot-password-header">
            <h1>🔐 忘记密码</h1>
            <a href="login.html" class="back-btn" title="返回登录">←</a>
        </div>
        
        <div class="forgot-password-content">
            <div class="info-section">
                <h2>找回密码</h2>
                <p>请输入您的手机号码和邮箱地址，我们将帮您重置密码。</p>
            </div>
            
            <form id="forgot-password-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="reset-phone">手机号码</label>
                        <input type="tel" id="reset-phone" placeholder="请输入注册时的手机号码" autocomplete="tel" required>
                        <div class="error-message" id="reset-phone-error"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="reset-email">邮箱地址</label>
                        <input type="email" id="reset-email" placeholder="请输入注册时的邮箱地址" autocomplete="email" required>
                        <div class="error-message" id="reset-email-error"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="new-password-reset">新密码</label>
                    <input type="password" id="new-password-reset" placeholder="请输入新密码（至少6位）" autocomplete="new-password" required>
                    <div class="error-message" id="new-password-reset-error"></div>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password-reset">确认新密码</label>
                    <input type="password" id="confirm-password-reset" placeholder="请再次输入新密码" autocomplete="new-password" required>
                    <div class="error-message" id="confirm-password-reset-error"></div>
                </div>
            </form>
        </div>
        
        <div class="forgot-password-actions">
                <button type="button" class="btn btn-primary" data-forgot-action="reset">重置密码</button>
                <button type="button" class="btn btn-secondary" data-forgot-action="back">取消</button>
        </div>
    </div>

    <script src="js/indexeddb-storage.js?v=20260619-1"></script>
    <script>
        document.addEventListener('click', function (event) {
            const button = event.target.closest('[data-forgot-action]');
            if (!button) return;

            if (button.dataset.forgotAction === 'reset') resetPassword();
            else if (button.dataset.forgotAction === 'back') goBack();
        });

        // 显示通知
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // 清空错误消息
        function clearForgotPasswordErrors() {
            const errorElements = document.querySelectorAll('.error-message');
            errorElements.forEach(el => el.textContent = '');
            
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => input.classList.remove('error'));
        }

        // 重置密码
        function resetPassword() {
            try {
                const phone = document.getElementById('reset-phone').value.trim();
                const email = document.getElementById('reset-email').value.trim();
                const newPassword = document.getElementById('new-password-reset').value;
                const confirmPassword = document.getElementById('confirm-password-reset').value;
                
                // 清空之前的错误消息
                clearForgotPasswordErrors();
                
                // 验证输入
                if (!phone || !email || !newPassword || !confirmPassword) {
                    showNotification('请填写所有字段', 'error');
                    return;
                }
                
                if (newPassword !== confirmPassword) {
                    showNotification('新密码和确认密码不匹配', 'error');
                    return;
                }
                
                if (newPassword.length < 6) {
                    showNotification('新密码长度至少6位', 'error');
                    return;
                }
                
                // 验证手机号格式
                if (!/^\d{6,15}$/.test(phone)) {
                    showNotification('手机号码格式不正确', 'error');
                    return;
                }
                
                // 验证邮箱格式
                if (!email.includes('@') || !email.includes('.')) {
                    showNotification('邮箱地址格式不正确', 'error');
                    return;
                }
                
                // 查找用户
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const user = users.find(u => 
                    (u.phone === phone || u.email === email) && 
                    (u.phone === phone && u.email === email)
                );
                
                if (!user) {
                    showNotification('未找到匹配的用户信息，请检查手机号和邮箱是否正确', 'error');
                    return;
                }
                
                // 更新用户密码
                user.password = newPassword;
                
                // 保存到localStorage
                localStorage.setItem('users', JSON.stringify(users));
                
                // 如果用户当前已登录，也更新会话中的密码
                const sessionStr = localStorage.getItem('userSession') || sessionStorage.getItem('userSession');
                if (sessionStr) {
                    try {
                        const session = JSON.parse(sessionStr);
                        if (session.user && (session.user.username === user.username || session.user.id === user.id)) {
                            // 更新整个用户对象，确保数据完整性
                            session.user = { ...session.user, ...user };
                            console.log('已更新会话中的用户数据:', session.user);
                            
                            if (localStorage.getItem('userSession')) {
                                localStorage.setItem('userSession', JSON.stringify(session));
                            } else {
                                sessionStorage.setItem('userSession', JSON.stringify(session));
                            }
                        }
                    } catch (e) {
                        console.warn('更新会话密码失败:', e);
                    }
                }
                
                showNotification('密码重置成功！请使用新密码登录', 'success');
                
                // 延迟跳转到登录页面
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (err) {
                console.error('resetPassword error', err);
                showNotification('密码重置失败，请稍后重试', 'error');
            }
        }

        // 返回登录页面
        function goBack() {
            window.location.href = 'login.html';
        }

        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 聚焦到第一个输入框
            document.getElementById('reset-phone').focus();
            
            // 添加输入框验证
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('blur', function() {
                    if (this.value.trim() === '') {
                        this.classList.add('error');
                    } else {
                        this.classList.remove('error');
                    }
                });
            });
        });
    </script>
    </div>

    <div class="legal-footer" style="text-align:center;padding:1.5rem 1rem 1rem;font-size:0.78rem;color:#9ca3af;">
        <a href="privacy.html" target="_blank" style="color:#6b7280;text-decoration:none;">隐私政策</a>
        <span style="margin:0 0.5rem;color:#d1d5db;">|</span>
        <a href="terms.html" target="_blank" style="color:#6b7280;text-decoration:none;">服务条款</a>
        <span style="margin:0 0.5rem;color:#d1d5db;">|</span>
        <span>数据存储在本地浏览器</span>
    </div>
</body>
</html>

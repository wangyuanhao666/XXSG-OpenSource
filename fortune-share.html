<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日一签 - 象限时光</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .fortune-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .fortune-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ffd700, #ffed4e, #ffd700);
        }

        .header {
            margin-bottom: 30px;
        }

        .logo {
            font-family: 'Noto Serif SC', serif;
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .date-info {
            color: #6c757d;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .fortune-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 24px;
            color: #ffd700;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .fortune-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 2px solid #ffd700;
            position: relative;
        }

        .fortune-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 32px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .fortune-meaning {
            font-size: 18px;
            color: #495057;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .fortune-advice {
            font-size: 16px;
            color: #6c757d;
            font-style: italic;
            line-height: 1.5;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #495057;
            border: 2px solid #dee2e6;
        }

        .btn-secondary:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #dc3545;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
        }

        .share-indicator {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ffd700;
            color: #2c3e50;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .fortune-container {
                padding: 20px;
                margin: 10px;
            }
            
            .fortune-text {
                font-size: 24px;
            }
            
            .fortune-meaning {
                font-size: 16px;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="fortune-container">
        <div class="share-indicator">分享</div>
        
        <div class="header">
            <div class="logo">象限时光</div>
            <div class="date-info" id="date-info">加载中...</div>
            <div class="fortune-title">每日一签</div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>正在加载签文...</div>
        </div>

        <div class="fortune-card" id="fortune-card" style="display: none;">
            <div class="fortune-text" id="fortune-text"></div>
            <div class="fortune-meaning" id="fortune-meaning"></div>
            <div class="fortune-advice" id="fortune-advice"></div>
        </div>

        <div class="error" id="error" style="display: none;">
            加载签文失败，请检查链接是否正确。
        </div>

        <div class="actions" id="actions" style="display: none;">
            <a href="#" class="btn btn-primary" id="visit-main">
                <i class="fas fa-home"></i>
                访问主页
            </a>
            <button class="btn btn-secondary" id="share-again">
                <i class="fas fa-share"></i>
                再次分享
            </button>
        </div>
    </div>

    <script>
        // 获取URL参数
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 解析分享数据
        function parseShareData() {
            const fortuneParam = getUrlParameter('fortune');
            if (!fortuneParam) {
                throw new Error('缺少签文参数');
            }

            try {
                // 尝试解码Base64数据
                let decodedData;
                try {
                    decodedData = decodeURIComponent(atob(fortuneParam));
                } catch (base64Error) {
                    console.warn('Base64解码失败，尝试直接解析:', base64Error);
                    // 如果Base64解码失败，尝试直接解析（可能是旧格式）
                    decodedData = fortuneParam;
                }
                
                const shareData = JSON.parse(decodedData);
                
                // 验证数据结构
                if (!shareData.fortune) {
                    throw new Error('签文数据不完整');
                }
                if (!shareData.fortune.text) {
                    throw new Error('签文内容缺失');
                }
                if (!shareData.fortune.meaning) {
                    throw new Error('签文解释缺失');
                }
                
                return shareData;
            } catch (error) {
                console.error('解析签文数据失败:', error);
                console.error('原始参数:', fortuneParam);
                throw new Error('签文数据解析失败: ' + error.message);
            }
        }

        // 显示签文
        function displayFortune(shareData) {
            const fortune = shareData.fortune;
            const date = new Date(shareData.date);

            // 显示日期
            const dateInfo = document.getElementById('date-info');
            dateInfo.textContent = date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });

            // 显示签文内容
            document.getElementById('fortune-text').textContent = fortune.text;
            document.getElementById('fortune-meaning').textContent = fortune.meaning;
            
            if (fortune.advice) {
                document.getElementById('fortune-advice').textContent = fortune.advice;
            } else {
                document.getElementById('fortune-advice').style.display = 'none';
            }

            // 显示内容
            document.getElementById('loading').style.display = 'none';
            document.getElementById('fortune-card').style.display = 'block';
            document.getElementById('actions').style.display = 'flex';
        }

        // 显示错误
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = message;
        }

        // 初始化
        function init() {
            try {
                const shareData = parseShareData();
                displayFortune(shareData);
            } catch (error) {
                console.error('初始化失败:', error);
                showError(error.message);
            }
        }

        // 绑定事件
        document.getElementById('visit-main').href = window.location.origin;
        
        document.getElementById('share-again').addEventListener('click', function() {
            const shareData = parseShareData();
            const shareUrl = window.location.href;
            
            if (navigator.share) {
                navigator.share({
                    title: '每日一签',
                    text: `我今天的签文是：${shareData.fortune.text}`,
                    url: shareUrl
                });
            } else if (navigator.clipboard) {
                navigator.clipboard.writeText(shareUrl).then(() => {
                    alert('链接已复制到剪贴板！');
                });
            } else {
                alert('分享链接：' + shareUrl);
            }
        });

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

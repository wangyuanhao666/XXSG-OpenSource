<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆形 -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.1"/>
  
  <!-- 四象限分割线 -->
  
  <!-- 第一象限：重要且紧急 (红色) -->
  <rect x="60" y="20" width="40" height="40" fill="#ef4444" opacity="0.8" rx="4"/>
  <text x="80" y="35" text-anchor="middle" fill="white" font-family="Noto Sans SC" font-size="8" font-weight="600">重</text>
  <text x="80" y="45" text-anchor="middle" fill="white" font-family="Noto Sans SC" font-size="8" font-weight="600">急</text>
  
  <!-- 第二象限：重要不紧急 (黄色) -->
  <rect x="20" y="20" width="40" height="40" fill="#f59e0b" opacity="0.8" rx="4"/>
  <text x="40" y="35" text-anchor="middle" fill="white" font-family="Noto Sans SC" font-size="8" font-weight="600">重</text>
  <text x="40" y="45" text-anchor="middle" fill="white" font-family="Noto Sans SC" font-size="8" font-weight="600">要</text>
  
  <!-- 第三象限：不重要但紧急 (蓝色) -->
  <rect x="60" y="60" width="40" height="40" fill="#3b82f6" opacity="0.8" rx="4"/>
  <text x="80" y="75" text-anchor="middle" fill="white" font-family="Noto Sans SC" font-size="8" font-weight="600">紧</text>
  <text x="80" y="85" text-anchor="middle" fill="white" font-family="Noto Sans SC" font-size="8" font-weight="600">急</text>
  
  <!-- 第四象限：不重要不紧急 (绿色) -->
  <rect x="20" y="60" width="40" height="40" fill="#10b981" opacity="0.8" rx="4"/>
  <text x="40" y="75" text-anchor="middle" fill="white" font-family="Noto Sans SC" font-size="8" font-weight="600">不</text>
  <text x="40" y="85" text-anchor="middle" fill="white" font-family="Noto Sans SC" font-size="8" font-weight="600">急</text>
  
  <!-- 中心时钟图标 -->
  <circle cx="60" cy="60" r="12" fill="white" stroke="#6366f1" stroke-width="2"/>
  <circle cx="60" cy="60" r="2" fill="#6366f1"/>
  <!-- 时针 -->
  <line x1="60" y1="60" x2="60" y2="52" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <!-- 分针 -->
  <line x1="60" y1="60" x2="66" y2="60" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 装饰性圆点 -->
  <circle cx="60" cy="15" r="2" fill="#6366f1" opacity="0.6"/>
  <circle cx="105" cy="60" r="2" fill="#6366f1" opacity="0.6"/>
  <circle cx="60" cy="105" r="2" fill="#6366f1" opacity="0.6"/>
  <circle cx="15" cy="60" r="2" fill="#6366f1" opacity="0.6"/>
</svg>

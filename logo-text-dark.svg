<svg width="220" height="70" viewBox="0 0 220 70" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义深色模式渐变色 -->
  <defs>
    <linearGradient id="titleGradientDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sloganGradientDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:0.9" />
      <stop offset="33%" style="stop-color:#fbbf24;stop-opacity:0.9" />
      <stop offset="66%" style="stop-color:#60a5fa;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- 左侧图标 -->
  <g transform="translate(10, 15)">
    <!-- 四象限背景 -->
    <rect x="20" y="0" width="20" height="20" fill="#f87171" opacity="0.9" rx="2"/>
    <rect x="0" y="0" width="20" height="20" fill="#fbbf24" opacity="0.9" rx="2"/>
    <rect x="20" y="20" width="20" height="20" fill="#60a5fa" opacity="0.9" rx="2"/>
    <rect x="0" y="20" width="20" height="20" fill="#34d399" opacity="0.9" rx="2"/>
    
    <!-- 分割线 -->
    
    <!-- 中心时钟 -->
    <circle cx="20" cy="20" r="6" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="1" fill="#8b5cf6"/>
    <line x1="20" y1="20" x2="20" y2="15" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="20" x2="24" y2="20" stroke="#8b5cf6" stroke-width="1" stroke-linecap="round"/>
  </g>
  
  <!-- 主标题 - 象限时光 -->
  <text x="65" y="35" font-family="Noto Sans SC" font-size="22" font-weight="700" fill="url(#titleGradientDark)">象限时光</text>
  
  <!-- 副标题 - 四格见天地，一步定乾坤 -->
  <text x="65" y="55" font-family="Noto Sans SC" font-size="8" font-weight="400" fill="url(#sloganGradientDark)">四格见天地，一步定乾坤</text>
</svg>
